<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D.HIT タスク管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{
  --brown:#1E1511;
  --brown-mid:#3D2B1F;
  --brown-light:#6B4C3B;
  --pink:#F2C4CE;
  --pink-mid:#E8A0B0;
  --pink-dark:#C97A8E;
  --cream:#FDF8F5;
  --cream-dark:#F5EDE8;
  --white:#FFFFFF;
  --text:#1E1511;
  --text-mid:#6B4C3B;
  --text-light:#A8887A;
  --border:#EDD9D0;
  --shadow:rgba(30,21,17,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--cream);color:var(--text);font-size:14px;min-height:100vh;}
button{touch-action:manipulation;-webkit-tap-highlight-color:transparent;cursor:pointer;-webkit-user-select:none;user-select:none;}
.top-bar{background:var(--pink);padding:0 1.2rem;display:flex;align-items:center;justify-content:space-between;height:52px;}
.logo-area{display:flex;align-items:center;gap:10px;}
.logo-svg{width:28px;height:28px;}
.logo-text{font-family:'DM Serif Display',serif;color:var(--brown);font-size:16px;letter-spacing:.05em;}
.coach-pill{background:var(--brown);color:var(--pink);font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px;letter-spacing:.05em;}
.date-txt{color:var(--brown-mid);font-size:11px;}
.app{max-width:680px;margin:0 auto;padding:1.2rem;}
.setup-box{background:var(--white);border:1.5px solid var(--pink-mid);border-radius:16px;padding:1.5rem;margin-bottom:1rem;}
.setup-box h3{font-size:15px;font-weight:700;color:var(--brown);margin-bottom:.5rem;}
.setup-box p{font-size:12px;color:var(--text-mid);line-height:1.8;margin-bottom:1rem;}
.setup-inp{width:100%;font-size:14px;border-radius:10px;border:1.5px solid var(--border);padding:10px 14px;background:var(--cream);color:var(--text);outline:none;font-family:'Noto Sans JP',sans-serif;margin-bottom:10px;}
.setup-inp:focus{border-color:var(--pink-dark);}
.setup-btn{padding:10px 24px;background:var(--brown);border:none;border-radius:10px;font-size:13px;cursor:pointer;font-weight:700;color:var(--pink);font-family:'Noto Sans JP',sans-serif;transition:opacity .2s;}
.setup-btn:hover{opacity:.85;}
.alert-box{background:#FFF0F3;border-left:4px solid var(--pink-dark);border-radius:10px;padding:10px 14px;margin-bottom:1rem;font-size:12px;color:var(--brown-mid);}
.alert-box b{font-weight:700;display:block;margin-bottom:3px;color:var(--brown);}
.gas-bar{display:flex;align-items:center;gap:8px;background:var(--cream-dark);border:1px solid var(--border);border-radius:10px;padding:8px 14px;margin-bottom:1rem;font-size:12px;color:var(--text-mid);}
.gas-dot{width:7px;height:7px;border-radius:50%;background:#BDBDBD;flex-shrink:0;}
.gas-dot.ok{background:#6BBF8E;}
.gas-dot.ng{background:#E57373;}
.gas-link{margin-left:auto;font-size:11px;color:var(--pink-dark);cursor:pointer;font-weight:500;}
.gas-form{background:var(--cream-dark);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:1rem;display:none;}
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.2rem;}
.sum-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:.8rem 1rem;text-align:center;}
.sum-card.highlight{background:var(--pink-dark);border-color:var(--pink-dark);}
.sum-num{font-family:'DM Serif Display',serif;font-size:28px;color:var(--brown);line-height:1;}
.sum-card.highlight .sum-num{color:var(--white);}
.sum-lbl{font-size:11px;color:var(--text-light);margin-top:3px;}
.sum-card.highlight .sum-lbl{color:var(--pink);}
.tabs{display:flex;gap:6px;margin-bottom:1rem;background:var(--cream-dark);border-radius:12px;padding:4px;}
.tab{flex:1;font-size:12px;padding:7px 0;border-radius:9px;border:none;background:transparent;cursor:pointer;color:var(--text-light);font-family:'Noto Sans JP',sans-serif;font-weight:500;transition:all .2s;}
.tab.on{background:var(--pink-dark);color:var(--white);font-weight:700;}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;align-items:center;}
.filter-lbl{font-size:11px;color:var(--text-light);}
.fpill{font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--white);cursor:pointer;color:var(--text-mid);transition:all .2s;}
.fpill.on{background:var(--pink-dark);color:var(--white);border-color:var(--pink-dark);}
.slbl{font-size:10px;font-weight:700;color:var(--text-light);letter-spacing:.12em;text-transform:uppercase;margin:1.2rem 0 .5rem;display:flex;align-items:center;gap:6px;}
.slbl::after{content:'';flex:1;height:1px;background:var(--border);}
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:.9rem 1.1rem;margin-bottom:8px;transition:box-shadow .2s;}
.card:hover{box-shadow:0 4px 16px var(--shadow);}
.card.ov{border-left:4px solid #E57373;border-radius:0 14px 14px 0;}
.card.urg{border-left:4px solid var(--pink-dark);border-radius:0 14px 14px 0;}
.crow{display:flex;align-items:flex-start;gap:10px;}
.chk{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .2s;}
.chk:hover{border-color:var(--pink-dark);}
.chk.dn{background:var(--brown);border-color:var(--brown);}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px;}
.tinfo{flex:1;min-width:0;}
.tlbl{font-size:13px;color:var(--text);word-break:break-all;font-weight:500;line-height:1.5;}
.tlbl.dn{text-decoration:line-through;color:var(--text-light);font-weight:400;}
.tact{font-size:12px;color:var(--pink-dark);margin-top:2px;}
.tmeta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap;}
.bdg{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:700;}
.br{background:#FFEBEE;color:#C62828;}
.bw{background:#FFF0F3;color:var(--pink-dark);}
.bi{background:#F3F0FF;color:#5E35B1;}
.bg2{background:#F0FFF4;color:#2E7D32;}
.bx{background:var(--cream-dark);color:var(--text-light);}
.pri-high{background:var(--brown);color:var(--pink);font-size:10px;padding:2px 8px;border-radius:8px;font-weight:700;}
.pri-mid{background:var(--cream-dark);color:var(--brown-mid);font-size:10px;padding:2px 8px;border-radius:8px;font-weight:700;}
.pri-low{background:var(--cream);color:var(--text-light);font-size:10px;padding:2px 8px;border-radius:8px;}
.rep-bdg{background:#E8F4FD;color:#1565C0;font-size:10px;padding:2px 8px;border-radius:8px;font-weight:500;}
.tdate{font-size:11px;color:var(--text-light);}
.tmemo{font-size:12px;color:var(--text-mid);background:var(--cream);border-radius:8px;padding:6px 10px;margin-top:6px;border-left:2px solid var(--pink);}
.irow{display:flex;gap:6px;margin-top:6px;}
.memo-inp{flex:1;font-size:12px;padding:5px 10px;border-radius:8px;border:1px solid var(--border);background:var(--cream);color:var(--text);outline:none;font-family:'Noto Sans JP',sans-serif;}
.memo-inp:focus{border-color:var(--pink-dark);}
.sm-btn{font-size:11px;padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:var(--white);cursor:pointer;color:var(--text-mid);font-family:'Noto Sans JP',sans-serif;white-space:nowrap;}
.sm-btn:hover{background:var(--cream-dark);}
.del{font-size:11px;color:var(--border);background:none;border:none;cursor:pointer;padding:2px 4px;}
.del:hover{color:#E57373;}
.empty{text-align:center;padding:3rem;color:var(--text-light);font-size:13px;}
.empty-icon{font-size:32px;margin-bottom:.5rem;}
.form-card{background:var(--white);border:1.5px solid var(--pink);border-radius:16px;padding:1.2rem;margin-bottom:1rem;animation:slideDown .2s ease;}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.form-card h4{font-size:13px;font-weight:700;color:var(--brown);margin-bottom:1rem;display:flex;align-items:center;gap:6px;}
.fg{margin-bottom:10px;}
.fg label{display:block;font-size:11px;color:var(--text-mid);margin-bottom:3px;font-weight:500;}
.fg input,.fg select,.fg textarea{width:100%;font-size:13px;border-radius:8px;border:1.5px solid var(--border);padding:8px 12px;background:var(--cream);color:var(--text);outline:none;font-family:'Noto Sans JP',sans-serif;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--pink-dark);}
.fg textarea{min-height:52px;resize:vertical;}
.fgrow{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.fgrow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.form-actions{display:flex;gap:8px;margin-top:1rem;}
.btn-p{padding:9px 22px;background:var(--brown);border:none;border-radius:10px;font-size:13px;cursor:pointer;font-weight:700;color:var(--pink);font-family:'Noto Sans JP',sans-serif;transition:opacity .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.btn-p:hover{opacity:.85;}
.btn-c{padding:9px 16px;background:transparent;border:1.5px solid var(--border);border-radius:10px;font-size:13px;cursor:pointer;color:var(--text-mid);font-family:'Noto Sans JP',sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.open-btn{width:100%;padding:12px;border:2px dashed var(--pink);border-radius:14px;background:transparent;cursor:pointer;font-size:13px;color:var(--pink-dark);margin-top:.5rem;font-family:'Noto Sans JP',sans-serif;font-weight:500;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.open-btn:hover{background:var(--cream-dark);}
.cname-h{font-size:14px;font-weight:700;color:var(--brown);}
.csub{font-size:12px;color:var(--text-light);}
.sdiv{border:none;border-top:1px solid var(--border);margin:10px 0;}
.pill-menu{position:absolute;background:var(--white);border:1.5px solid var(--border);border-radius:12px;box-shadow:0 4px 16px rgba(30,21,17,.15);padding:6px;z-index:100;min-width:140px;display:none;}
.pill-menu.open{display:block;}
.pill-menu button{display:block;width:100%;text-align:left;font-size:12px;padding:8px 12px;border:none;background:none;cursor:pointer;border-radius:8px;color:var(--text);font-family:'Noto Sans JP',sans-serif;}
.pill-menu button:hover{background:var(--cream-dark);}
.pill-menu button.danger{color:#E57373;}
.pill-wrap{position:relative;display:inline-block;}
.drag-handle{cursor:grab;color:var(--text-light);font-size:16px;padding:2px 6px;user-select:none;flex-shrink:0;}
.drag-handle:active{cursor:grabbing;}
.card.drag-over{border:2px dashed var(--pink-dark);background:var(--cream-dark);}
.card.dragging{opacity:0.4;}
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo-area">
    <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA5MCAyNiI+PHRleHQgeD0iMCIgeT0iMjAiIGZvbnQtZmFtaWx5PSJHZW9yZ2lhLCdUaW1lcyBOZXcgUm9tYW4nLHNlcmlmIiBmb250LXNpemU9IjIyIiBmb250LXdlaWdodD0iNzAwIiBmaWxsPSIjMUUxNTExIiBsZXR0ZXItc3BhY2luZz0iMSI+RC5ISVQ8L3RleHQ+PC9zdmc+" style="height:22px;object-fit:contain;">
    <span class="logo-text" style="display:none;">D.HIT</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="date-txt" id="tlbl"></span>
    <span class="coach-pill" id="coach-badge" style="display:none;"></span>
  </div>
</div>

<div class="app">
  <div id="setup-area"></div>
  <div id="alert"></div>
  <div id="main-ui" style="display:none;">
    <div style="margin-bottom:1rem;display:flex;align-items:center;gap:10px;">
      <button onclick="toggleGasForm()" style="font-size:11px;color:var(--text-light);background:none;border:none;cursor:pointer;padding:0;font-family:'Noto Sans JP',sans-serif;">⚙ スプシ連携設定</button>
      <button id="load-btn" onclick="loadFromGas()" style="font-size:11px;color:var(--pink-dark);background:none;border:1px solid var(--pink);border-radius:20px;cursor:pointer;padding:3px 12px;font-family:'Noto Sans JP',sans-serif;">スプシから読み込む</button>
    </div>
    <div id="gas-form" style="display:none;background:var(--cream-dark);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:1rem;">
      <div class="fg"><label>GAS WebアプリURL</label>
        <input id="gas-url" type="text" placeholder="https://script.google.com/macros/s/XXXXX/exec">
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="sm-btn" onclick="saveGas()">保存</button>
        <button class="sm-btn" onclick="testGas()">接続テスト</button>
        <span id="gas-status" style="font-size:11px;color:var(--text-light);"></span>
      </div>
    </div>
    <div class="summary-row" id="summary"></div>
    <div class="tabs">
      <button class="tab on" onclick="sw('all')">全体</button>
      <button class="tab" onclick="sw('done')">完了済み</button>
    </div>
    <div id="filter-area"></div>
    <div id="content"></div>
    <div id="addform" style="display:none;">
      <div class="form-card">
        <h4>＋ タスクを追加</h4>
        <div class="fg"><label>タブの選択（新規の場合は下に入力）</label>
          <select id="f-sel" style="width:100%;font-size:13px;padding:8px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--cream);color:var(--text);font-family:'Noto Sans JP',sans-serif;">
            <option value="">＋ 新規タブを追加</option>
          </select>
        </div>
        <div id="newc-fields">
          <div class="fg"><label>タブ名</label><input id="f-name" type="text" placeholder="例：受講生名、仕事、プライベート"></div>
          <div class="fg"><label>メモ（任意）</label><input id="f-cmemo" type="text" placeholder="例：メモ"></div>
        </div>
        <hr class="sdiv">
        <div class="fg"><label>タスク内容</label><input id="f-task" type="text" placeholder="例：商談ロープレ、お手紙20件送付"></div>
        <div class="fgrow">
          <div class="fg"><label>期日</label><input id="f-date" type="date"></div>
          <div class="fg"><label>優先度</label>
            <select id="f-pri" style="width:100%;font-size:13px;padding:8px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--cream);color:var(--text);font-family:'Noto Sans JP',sans-serif;">
              <option value="high">高（優先対応）</option>
              <option value="mid" selected>普通</option>
              <option value="low">低（余裕があれば）</option>
            </select>
          </div>
        </div>
        <div class="fg"><label>私がやること</label><input id="f-act" type="text" placeholder="例：トークノートで確認"></div>
        <div class="fg"><label>繰り返し</label>
          <div style="display:flex;align-items:center;gap:6px;">
            <select id="f-rep-toggle" style="font-size:13px;padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--cream);color:var(--text);font-family:'Noto Sans JP',sans-serif;flex-shrink:0;">
              <option value="none">繰り返しなし</option>
              <option value="custom">カスタム</option>
            </select>
            <div id="f-rep-custom" style="display:none;align-items:center;gap:4px;flex:1;">
              <input id="f-rep-num" type="number" min="1" max="99" value="1" style="width:60px;font-size:13px;padding:8px 8px;border-radius:8px;border:1.5px solid var(--border);background:var(--cream);color:var(--text);font-family:'Noto Sans JP',sans-serif;text-align:center;">
              <select id="f-rep-unit" style="font-size:13px;padding:8px 8px;border-radius:8px;border:1.5px solid var(--border);background:var(--cream);color:var(--text);font-family:'Noto Sans JP',sans-serif;">
                <option value="d">日ごと</option>
                <option value="w">週ごと</option>
                <option value="m">ヶ月ごと</option>
              </select>
            </div>
          </div>
        </div>
        <div class="fg"><label>タスクメモ（任意）</label><textarea id="f-tmemo" placeholder="備考など" style="min-height:52px;resize:vertical;"></textarea></div>
        <div class="form-actions">
          <div class="btn-c" id="btn-cancelform" role="button" style="display:inline-block;padding:9px 16px;text-align:center;">キャンセル</div>
          <div class="btn-p" id="btn-savenew" role="button" style="display:inline-block;padding:9px 22px;text-align:center;">追加する</div>
        </div>
      </div>
    </div>
    <button class="open-btn" id="addbtn">＋ タスクを追加</button>
  </div>
</div>

<script>
const DOTCOLS=['#C97A8E','#7B9E8C','#8B7BB5','#C4956A','#6B9EC4'];
const today=new Date();today.setHours(0,0,0,0);
const ck='<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><polyline points="1,4.5 4,7.5 10,1" stroke="#F2C4CE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function fmt(d){const x=new Date(d);return(x.getMonth()+1)+'/'+(x.getDate());}
function du(ds){const d=new Date(ds);d.setHours(0,0,0,0);return Math.round((d-today)/86400000);}
function bdg(days){if(days<0)return['br','期限切れ'];if(days===0)return['bw','今日'];if(days<=2)return['bw','あと'+days+'日'];if(days<=7)return['bi','あと'+days+'日'];return['bg2','あと'+days+'日'];}
function ad(n){const d=new Date(today);d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];}
function priBdg(p){if(p==='high')return'<span class="pri-high">優先高</span>';if(p==='mid')return'<span class="pri-mid">普通</span>';return'<span class="pri-low">低</span>';}
function repBdg(r){
  if(!r||r==='none')return'';
  // 新形式: "3d","2w","1m" / 旧形式: "1","3","7","14","30"(日数)
  const legacyMap={'1':'毎日','3':'3日ごと','7':'毎週','14':'2週ごと','30':'毎月'};
  if(legacyMap[String(r)])return`<span class="rep-bdg">${legacyMap[String(r)]}</span>`;
  const match=String(r).match(/^(\d+)([dwm])$/);
  if(!match)return'';
  const n=match[1],u=match[2];
  const unit={d:'日',w:'週',m:'ヶ月'}[u];
  const label=n==='1'?`毎${unit}`:`${n}${unit}ごと`;
  return`<span class="rep-bdg">${label}</span>`;
}

function getCoachFromUrl(){const p=new URLSearchParams(window.location.search);return decodeURIComponent(p.get('coach')||'');}
let COACH='';
function dataKey(){return 'dhit_v3_'+COACH;}
function gasKey(){return 'dhit_gas_'+COACH;}
function ld(){try{const s=localStorage.getItem(dataKey());return s?JSON.parse(s):{cs:[]};}catch{return{cs:[]};}}
function sv(){
  try{localStorage.setItem(dataKey(),JSON.stringify(D));}catch{}
  try{localStorage.setItem(dataKey()+'_order',JSON.stringify(manualOrder));}catch{}
}

let D={cs:[]},tab='all',filterCid=null,showForm=false;
let sortMode='manual',manualOrder=[];
let gasUrl='';

function saveGas(){
  gasUrl=document.getElementById('gas-url').value.trim();
  localStorage.setItem(gasKey(),gasUrl);
  const s=document.getElementById('gas-status');
  if(s)s.textContent='保存しました✅';
  toggleGasForm();
}
async function testGas(){
  const url=document.getElementById('gas-url').value.trim();
  if(!url){alert('URLを入力してください');return;}
  const s=document.getElementById('gas-status');
  if(s)s.textContent='確認中...';
  try{
    await fetch(url,{method:'GET',mode:'no-cors'});
    if(s)s.textContent='接続✅';
  }catch{
    if(s)s.textContent='接続NG❌';
  }
}
function toggleGasForm(){
  const f=document.getElementById('gas-form');
  if(!f)return;
  f.style.display=f.style.display==='none'?'block':'none';
  if(f.style.display==='block'&&gasUrl)document.getElementById('gas-url').value=gasUrl;
}
async function postGas(action,task,studentName,extra){
  if(!gasUrl||!COACH)return;
  const payload={action,coachName:COACH,task:{id:task.id,studentName,label:task.lbl,action:task.act,date:task.date,memo:task.memo||'',priority:task.pri||'mid',repeat:task.rep||'none'},...(extra||{})};
  await sendToGas(payload);
}
async function postGasRaw(payload){
  if(!gasUrl||!COACH)return;
  await sendToGas({coachName:COACH,...payload});
}
async function sendToGas(payload){
  const body=JSON.stringify(payload);
  // FormDataとJSONの両方を試みる（Safari対応）
  try{
    const form=new FormData();
    form.append('data',body);
    const res=await fetch(gasUrl,{method:'POST',body:form,redirect:'follow'});
    if(res.ok||res.type==='opaque')return;
  }catch(e1){console.warn('FormData失敗',e1);}
  // フォールバック: URLエンコード
  try{
    await fetch(gasUrl,{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'data='+encodeURIComponent(body),
      redirect:'follow'
    });
  }catch(e2){console.warn('GAS送信失敗',e2);}
}

async function loadFromGas(){
  if(!gasUrl||!COACH){alert('スプシ連携設定をしてください');return;}
  const btn=document.getElementById('load-btn');
  if(btn)btn.textContent='読み込み中...';
  try{
    const res=await fetch(gasUrl+'?action=load&coach='+encodeURIComponent(COACH),{redirect:'follow',cache:'no-cache'});
    const json=await res.json();
    if(json.status==='ok'){
      // スプシのデータでローカルを完全上書き
      const gasIds=(json.tasks||[]).map(t=>String(t.id));
      const customerMap={};

      // タブ名変更に対応: スプシのstudentNameでタブを再構築
      (json.tasks||[]).forEach(t=>{
        if(!customerMap[t.studentName]){
          // 既存タブを探す（IDで照合）
          const existing=D.cs.find(c=>c.name===t.studentName);
          customerMap[t.studentName]=existing||{id:Date.now()+Math.random(),name:t.studentName,col:Object.keys(customerMap).length%5,memo:'',ts:[]};
        }
        const c=customerMap[t.studentName];
        const exists=c.ts.find(x=>String(x.id)===String(t.id));
        if(!exists){
          // 新規タスクを追加
          c.ts.push({id:t.id,date:t.date,lbl:t.label,act:t.action,memo:t.memo||'',pri:t.priority||'mid',rep:t.repeat||'none',dn:t.status==='完了'});
        }else{
          // 全フィールドをスプシで上書き
          exists.dn=t.status==='完了';
          exists.lbl=t.label;
          exists.act=t.action;
          exists.memo=t.memo||'';
          exists.pri=t.priority||'mid';
          exists.rep=t.repeat||'none';
          exists.date=t.date;
        }
      });

      // スプシにないタスクをローカルから削除
      Object.values(customerMap).forEach(c=>{
        c.ts=c.ts.filter(t=>gasIds.includes(String(t.id)));
      });

      // ローカルのD.csをcustomerMapで完全置き換え
      D.cs=Object.values(customerMap).filter(c=>c.ts.length>0);

      // 並び順を反映
      if(json.order&&json.order.length>0)manualOrder=json.order;
      sv();render();
      if(btn)btn.textContent='✅ 読み込み完了';
    }
  }catch(e){
    console.warn('読み込み失敗',e);
    if(btn)btn.textContent='❌ 読み込み失敗';
  }
  setTimeout(()=>{if(btn)btn.textContent='スプシから読み込む';},3000);
}

function init(){
  document.getElementById('tlbl').textContent=today.toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'});
  // document全体でのイベント委譲（Safari対応）
  document.addEventListener('click',function(e){
    const t=e.target;
    if(t.id==='btn-savenew'||t.closest('#btn-savenew')){saveNew();return;}
    if(t.id==='btn-cancelform'||t.closest('#btn-cancelform')){toggleForm();return;}
    if(!t.closest('.pill-wrap')&&!t.closest('#addbtn'))closeMenus();
  });
  // addbtnのイベント（Safari対応）
  let addbtnTouched=false;
  document.getElementById('addbtn').addEventListener('touchend',function(e){
    e.stopPropagation();
    e.preventDefault();
    addbtnTouched=true;
    toggleForm();
    setTimeout(()=>{addbtnTouched=false;},300);
  },{passive:false});
  document.getElementById('addbtn').addEventListener('click',function(e){
    e.stopPropagation();
    if(addbtnTouched)return; // touchendで処理済みの場合スキップ
    toggleForm();
  });
  // pill-wrap外タップ/クリックでメニューを閉じる
  document.addEventListener('click',function(e){
    if(!e.target.closest('.pill-wrap')&&!e.target.closest('#addbtn'))closeMenus();
  });
  // フォームボタンのイベント委譲（Safari touchend対応）
  function handleFormBtn(e){
    const btn=e.target.closest('[data-action]');
    if(!btn)return;
    e.stopPropagation();
    if(e.type==='touchend')e.preventDefault();
    const action=btn.getAttribute('data-action');
    if(action==='saveNew')saveNew();
    if(action==='toggleForm')toggleForm();
  }
  document.addEventListener('click',handleFormBtn);
  document.addEventListener('touchend',handleFormBtn,{passive:false});
  const urlCoach=getCoachFromUrl();
  if(urlCoach){startApp(urlCoach);}
  else{
    document.getElementById('setup-area').innerHTML=`
      <div class="setup-box">
        <h3>はじめにタブ名を入力してください</h3>
        <p>管理者からURLを受け取った場合はそのURLを開いてください。<br>自分で設定する場合はタブ名を入力してください。</p>
        <input class="setup-inp" id="name-inp" type="text" placeholder="例：まいこ">
        <button class="setup-btn" onclick="startFromInput()">はじめる</button>
      </div>`;
  }
}

function renderContent(){
  const el=document.getElementById('content');let h='';
  if(tab==='all'){
    // 全タスクをフラットに展開
    let allTasks=[];
    D.cs.forEach(c=>{
      if(filterCid!==null&&filterCid!==c.id)return;
      c.ts.forEach(t=>{if(!t.dn)allTasks.push({c,t});});
    });
    // 並び替え
    if(sortMode==='date'){
      allTasks.sort((a,b)=>a.t.date.localeCompare(b.t.date));
    }else if(sortMode==='pri'){
      const o={high:0,mid:1,low:2};
      allTasks.sort((a,b)=>(o[a.t.pri||'mid'])-(o[b.t.pri||'mid']));
    }else{
      // 手動順: manualOrderに基づく
      allTasks.sort((a,b)=>{
        const ai=manualOrder.indexOf(String(a.t.id));
        const bi=manualOrder.indexOf(String(b.t.id));
        const ar=ai===-1?9999:ai;
        const br=bi===-1?9999:bi;

          ondragover="dragOver(event)"
          ondragleave="dragLeave(event)"
          ondrop="dragDrop(event,'${t.id}')"
          ondragend="dragEnd(event)"

          ontouchmove="touchMove(event)"

async function tog(cid,tid){
  const c=D.cs.find(x=>x.id===cid);const t=c.ts.find(x=>x.id===tid);
  t.dn=!t.dn;
  if(t.dn){
    await postGas('complete',t,c.name);
    if(t.rep&&t.rep!=='none'){
      // 新形式: "3d","2w","1m" / 旧形式: 数字(日数)
      let nextDate=new Date(t.date);nextDate.setHours(0,0,0,0);
      const repStr=String(t.rep);
      const newFmt=repStr.match(/^(\d+)([dwm])$/);
      if(newFmt){
        const n=parseInt(newFmt[1]),u=newFmt[2];
        if(u==='d')nextDate.setDate(nextDate.getDate()+n);
        else if(u==='w')nextDate.setDate(nextDate.getDate()+n*7);
        else if(u==='m')nextDate.setMonth(nextDate.getMonth()+n);
      }else{
        nextDate.setDate(nextDate.getDate()+parseInt(repStr));
      }
      const nextTask={id:Date.now()+Math.floor(Math.random()*9999),date:nextDate.toISOString().split('T')[0],lbl:t.lbl,act:t.act,memo:t.memo,pri:t.pri,rep:t.rep,dn:false};
      c.ts.push(nextTask);
      await postGas('add',nextTask,c.name);
    }
  }
  sv();render();
}

}

function delT(cid,tid){
  const c=D.cs.find(x=>x.id===cid);
  const t=c.ts.find(x=>x.id===tid);
  if(t){
    postGas('delete',t,c.name);
    const deletedIds=JSON.parse(localStorage.getItem(dataKey()+'_deleted')||'[]');
    deletedIds.push(String(t.id));
    localStorage.setItem(dataKey()+'_deleted',JSON.stringify(deletedIds));
  }
  c.ts=c.ts.filter(x=>x.id!==tid);
  sv();render();
}
function delC(cid){if(!confirm('このタブを削除しますか？'))return;D.cs=D.cs.filter(c=>c.id!==cid);if(filterCid===cid)filterCid=null;sv();render();}
function saveMemo(cid,tid){
  const inp=document.getElementById('mi'+tid);if(!inp)return;
  const c=D.cs.find(x=>x.id===cid);const t=c.ts.find(x=>x.id===tid);
  t.memo=inp.value.trim();sv();render();
}

function toggleForm(){
  showForm=!showForm;
  document.getElementById('addbtn').textContent=showForm?'✕ 閉じる':'＋ タスクを追加';
  const addformEl=document.getElementById('addform');
  addformEl.style.display=showForm?'block':'none';
  if(showForm){
    // タブ選択肢を更新
    const sel=document.getElementById('f-sel');
    const currentVal=sel.value;
    while(sel.options.length>1)sel.remove(1);
    D.cs.forEach(c=>{
      const opt=document.createElement('option');
      opt.value=c.id;
      opt.textContent=c.name;
      sel.appendChild(opt);
    });
    sel.value=currentVal;
    // 日付を今日に設定
    document.getElementById('f-date').value=today.toISOString().split('T')[0];
    // フォームをリセット
    document.getElementById('f-task').value='';
    document.getElementById('f-act').value='';
    document.getElementById('f-tmemo').value='';
    document.getElementById('f-name').value='';
    document.getElementById('f-cmemo').value='';
    selChange();
  }
}
function selChange(){document.getElementById('newc-fields').style.display=document.getElementById('f-sel').value?'none':'block';}
function setSort(mode){
  sortMode=mode;
  if(mode!=='manual'){
    // 現在の表示順をmanualOrderに記録
    let allIds=[];
    D.cs.forEach(c=>c.ts.forEach(t=>{if(!t.dn)allIds.push(String(t.id));}));
    manualOrder=allIds;
  }
  sv();render();
}
function moveTask(tid,dir){
  sortMode='manual';
  let allTasks=[];
  D.cs.forEach(c=>{
    if(filterCid!==null&&filterCid!==c.id)return;
    c.ts.forEach(t=>{if(!t.dn)allTasks.push({c,t});});
  });
  allTasks.sort((a,b)=>{
    const ai=manualOrder.indexOf(String(a.t.id));
    const bi=manualOrder.indexOf(String(b.t.id));
    return(ai===-1?9999:ai)-(bi===-1?9999:bi);
  });
  const ids=allTasks.map(x=>String(x.t.id));
  const idx=ids.indexOf(String(tid));
  if(idx===-1)return;
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=ids.length)return;
  [ids[idx],ids[newIdx]]=[ids[newIdx],ids[idx]];
  manualOrder=ids;
  sv();render();
  // 並び順をスプシに送信
  postGasRaw({action:'updateOrder',order:ids});
}

// ===== ドラッグ&ドロップ =====
let dragSrcId=null;

function dragStart(e,tid){
  dragSrcId=tid;
  sortMode='manual';
  e.dataTransfer.effectAllowed='move';
  e.currentTarget.classList.add('dragging');
}
function dragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('drag-over');
}
function dragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}
function dragDrop(e,targetId){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!dragSrcId||dragSrcId===targetId)return;
  swapTasks(dragSrcId,targetId);
}
function dragEnd(e){
  e.currentTarget.classList.remove('dragging','drag-over');
  dragSrcId=null;
}

function swapTasks(srcId,targetId){
  // 現在の並び順を取得
  let allTasks=[];
  D.cs.forEach(c=>{
    if(filterCid!==null&&filterCid!==c.id)return;
    c.ts.forEach(t=>{if(!t.dn)allTasks.push({c,t});});
  });
  allTasks.sort((a,b)=>{
    const ai=manualOrder.indexOf(String(a.t.id));
    const bi=manualOrder.indexOf(String(b.t.id));
    return(ai===-1?9999:ai)-(bi===-1?9999:bi);
  });
  const ids=allTasks.map(x=>String(x.t.id));
  const si=ids.indexOf(String(srcId));
  const ti=ids.indexOf(String(targetId));
  if(si===-1||ti===-1)return;
  ids.splice(si,1);
  ids.splice(ti,0,String(srcId));
  manualOrder=ids;
  sv();render();
}

// ===== タッチドラッグ（スマホ） =====
let touchSrcId=null,touchClone=null,touchStartY=0;

function touchStart(e,tid){
  // ハンドル部分のみドラッグ開始
  if(!e.target.classList.contains('drag-handle'))return;
  touchSrcId=tid;
  sortMode='manual';
  touchStartY=e.touches[0].clientY;
  const card=e.currentTarget;
  // 半透明クローン作成
  touchClone=card.cloneNode(true);
  touchClone.style.cssText='position:fixed;left:'+card.getBoundingClientRect().left+'px;top:'+card.getBoundingClientRect().top+'px;width:'+card.offsetWidth+'px;opacity:0.7;z-index:9999;pointer-events:none;';
  document.body.appendChild(touchClone);
  card.classList.add('dragging');
  e.preventDefault();
}
function touchMove(e){
  if(!touchSrcId||!touchClone)return;
  const touch=e.touches[0];
  touchClone.style.top=(touch.clientY-40)+'px';
  e.preventDefault();
}
function touchEnd(e,tid){
  if(!touchSrcId||!touchClone)return;
  const touch=e.changedTouches[0];
  // タッチ位置のカードを探す
  touchClone.style.display='none';
  const el=document.elementFromPoint(touch.clientX,touch.clientY);
  touchClone.style.display='';
  const targetCard=el?el.closest('[id^="card-"]'):null;
  if(targetCard){
    const targetId=targetCard.id.replace('card-','');
    if(targetId!==touchSrcId)swapTasks(touchSrcId,targetId);
  }
  // クリーンアップ
  touchClone.remove();
  touchClone=null;
  document.querySelectorAll('.dragging').forEach(el=>el.classList.remove('dragging'));
  touchSrcId=null;
  render();
}
function toggleRepInput(prefix){
  const toggle=document.getElementById(prefix+'-rep-toggle')||document.getElementById('f-rep-toggle');
  const customDiv=document.getElementById(prefix+'-rep-custom')||document.getElementById('f-rep-custom');
  if(!toggle||!customDiv)return;
  customDiv.style.display=toggle.value==='none'?'none':'flex';
}
async function saveNew(){
  // フォームの値を取得（要素が存在するか確認）
  // Safari対応: querySelectorで取得
  const formEl=document.getElementById('addform');
  const inputs=formEl?formEl.querySelectorAll('input,select,textarea'):{};
  const getVal=id=>{const el=document.getElementById(id);return el?el.value:'';};
  const sel=getVal('f-sel');
  const task=getVal('f-task').trim();
  const date=getVal('f-date');
  const act=getVal('f-act').trim();
  const tmemo=getVal('f-tmemo').trim();
  const pri=getVal('f-pri')||'mid';
  if(!task||!date){alert('タスク内容と期日は必須です');return;}
  let c;
  if(sel){c=D.cs.find(x=>x.id===parseInt(sel));}
  else{
    const nameEl=document.getElementById('f-name');
    const cmemoEl=document.getElementById('f-cmemo');
    const name=nameEl?nameEl.value.trim():'';
    const cmemo=cmemoEl?cmemoEl.value.trim():'';
    if(!name){alert('タブ名を入力してください');return;}
    c={id:Date.now(),name,col:D.cs.length%5,memo:cmemo,ts:[]};D.cs.push(c);
  }
  const repToggleEl=document.getElementById('f-rep-toggle');
  const fRepToggle=repToggleEl?repToggleEl.value:'none';
  const repNumEl=document.getElementById('f-rep-num');
  const repUnitEl=document.getElementById('f-rep-unit');
  const rep=fRepToggle==='none'?'none':(repNumEl&&repUnitEl?repNumEl.value+repUnitEl.value:'none');
  const newTask={id:Date.now()+1,date,lbl:task,act:act||'対応予定',memo:tmemo,pri,rep,dn:false};
  c.ts.push(newTask);
  await postGas('add',newTask,c.name);
  sv();toggleForm();render();
}
init();
